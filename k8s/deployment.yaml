apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-cd-test
  labels:
    app: ci-cd-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ci-cd-test
  template:
    metadata:
      labels:
        app: ci-cd-test
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          image: ghcr.io/stevengilmore365/ci-cd-test:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
